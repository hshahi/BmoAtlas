<!doctype html>

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BmoAtlas — Theme Previews</title>
<style>
  /* ─────────────────────────────────────────────────────────────
     Standalone preview — NOT part of the app or its build.
     Each .theme panel sets the same CSS custom properties the real
     app uses (_tokens.css), and the shared component CSS below reads
     them — exactly mirroring the production architecture.
     ───────────────────────────────────────────────────────────── */

  :root {
    --font-sans: 'Segoe UI', system-ui, -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', 'Cascadia Code', Consolas, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-sans);
    background: #15171c;
    color: #e8eaed;
    padding: 32px;
    line-height: 1.5;
  }

  .page-title { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
  .page-sub   { color: #9aa0a6; margin-bottom: 28px; font-size: 14px; }
  .group-title {
    font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em;
    color: #9aa0a6; margin: 28px 0 14px; font-weight: 600;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
  }

  /* ── A single theme mockup ─────────────────────────────────── */
  .theme {
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #2a2e3d;
    background: var(--color-bg);
    color: var(--color-text);
    font-size: 14px;
  }

  .label {
    padding: 8px 14px;
    background: #0c0e12;
    color: #cdd2da;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.04em;
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid #2a2e3d;
  }
  .label .tag { color: #6b7280; font-family: var(--font-mono); font-weight: 400; }

  .toolbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 14px;
    background: var(--toolbar-bg);
    color: var(--toolbar-text);
    border-bottom: 1px solid var(--toolbar-border);
  }
  .toolbar .brand { font-weight: 700; letter-spacing: 0.05em; }
  .toolbar .icons { display: flex; gap: 8px; opacity: 0.85; }

  .body { padding: 16px; }

  .card {
    background: var(--card-bg, var(--color-bg-surface));
    border: 1px solid var(--card-border, var(--color-border));
    border-radius: 10px;
    padding: 16px;
    box-shadow: var(--card-shadow, 0 1px 2px rgb(0 0 0 / 0.08));
  }
  .card h3 { font-size: 16px; margin-bottom: 4px; }
  .card .muted { color: var(--color-text-secondary); font-size: 13px; margin-bottom: 12px; }

  .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }

  .btn {
    padding: 7px 16px; border-radius: 8px; font-size: 13px; font-weight: 500;
    border: none; cursor: pointer; transition: filter 0.15s;
  }
  .btn:hover { filter: brightness(1.05); }
  .btn-primary {
    background: var(--btn-primary-bg, var(--color-primary));
    color: var(--btn-text, var(--color-text-inverse));
    box-shadow: var(--btn-shadow, none);
    border: var(--btn-border, none);
  }
  .btn-outline {
    background: transparent;
    color: var(--color-primary);
    border: 1px solid var(--color-primary);
  }

  .badge {
    padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 600;
    box-shadow: var(--badge-shadow, none);
  }
  .badge-gain { background: var(--color-success-light); color: var(--color-gain); }
  .badge-loss { background: var(--color-danger-light); color: var(--color-loss); }

  .num { font-family: var(--font-mono); font-weight: 600; }
  .gain { color: var(--color-gain); }
  .loss { color: var(--color-loss); }

  .input {
    width: 100%; padding: 8px 12px; border-radius: 8px;
    background: var(--input-bg, var(--color-bg-surface));
    border: 1px solid var(--input-border, var(--color-border));
    box-shadow: var(--input-shadow, none);
    color: var(--color-text);
    font-size: 13px;
  }
  .input::placeholder { color: var(--color-text-muted); }
</style>

  function panel(key, t) {
    const style = Object.entries(t.vars).map(([k,v]) => `${k}:${v}`).join(';');
    return `
      <div class="theme" style="${style}">
        <div class="label"><span>${t.name}</span><span class="tag">${t.tag}</span></div>
        <div class="toolbar">
          <span class="brand">BMO · Capital Markets</span>
          <span class="icons">🔔 ⚙ 👤</span>
        </div>
        <div class="body">
          <div class="card">
            <h3>AAPL · Apple Inc.</h3>
            <div class="muted">NASDAQ · Real-time quote</div>
            <div class="row">
              <span class="num">$192.43</span>

              <span class="badge badge-loss">▼ 0.44%</span>
            </div>
            <div class="row">
              <button class="btn btn-primary">Buy</button>
              <button class="btn btn-outline">Watchlist</button>
            </div>
            <input class="input" placeholder="Search ticker…">
          </div>
        </div>
      </div>`;
  }

  for (const [key, t] of Object.entries(THEMES)) {
    document.getElementById(t.group).insertAdjacentHTML('beforeend', panel(key, t));
