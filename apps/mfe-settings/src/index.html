<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>MFE Settings</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script>
    (function() {
      try {
        var theme = localStorage.getItem('bmo-atlas-theme');
        if (['light', 'dark', 'silver', 'silver-shine', 'midnight', 'platinum', 'chrome', 'titanium', 'nord', 'dracula', 'tokyo-night', 'high-contrast', 'catppuccin', 'merged-blue'].indexOf(theme) !== -1) {
          document.documentElement.setAttribute('data-theme', theme);
        } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      } catch(e) {}
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
