@if (hasErrors()) {
  <div class="toast-container" role="alert" aria-live="assertive">
    @for (error of errors(); track error.id) {
      <div class="toast">
        <div class="toast__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="8" x2="12" y2="12" />
            <line x1="12" y1="16" x2="12.01" y2="16" />
          </svg>
        </div>
        <div class="toast__body">
          <p class="toast__message">{{ error.message }}</p>
          @if (error.status) {
            <span class="toast__status">Status: {{ error.status }}</span>
          }
        </div>
        <button class="toast__close" (click)="dismiss(error.id)" aria-label="Dismiss error">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
    }
  </div>
}
